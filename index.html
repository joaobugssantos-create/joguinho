<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Corrida Turbo - Cidade e Natureza | Jogo de Corrida</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0a2f1f 0%, #051a0e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Orbitron', 'Courier New', monospace;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            background: #1a2a1f;
            border-radius: 48px;
            padding: 20px 25px 25px 25px;
            box-shadow: 0 25px 35px rgba(0,0,0,0.6), inset 0 1px 2px rgba(255,255,255,0.1);
            position: relative;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 20px;
            box-shadow: 0 0 0 4px #ffd966, 0 12px 28px black;
            cursor: pointer;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
            background: #0e1f0bdd;
            backdrop-filter: blur(4px);
            border-radius: 60px;
            padding: 12px 24px;
            border: 1px solid #e0b04b;
            color: #f7f3e0;
            text-shadow: 0 2px 2px black;
            flex-wrap: wrap;
            justify-content: center;
        }

        .score-area, .fuel-area, .lives-area {
            background: #021005;
            padding: 6px 20px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: inset 0 1px 3px #00000055, 0 2px 4px #ffdd8844;
        }

        .score-area span:first-child, .fuel-area span:first-child, .lives-area span:first-child {
            font-size: 1.3rem;
            background: #f5b64230;
            padding: 4px 12px;
            border-radius: 30px;
        }

        .fuel-bar-bg {
            width: 180px;
            height: 20px;
            background-color: #3a2a1a;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: inset 0 1px 4px black;
        }

        .fuel-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #fdcc0a, #ff9f2e);
            border-radius: 20px;
            transition: width 0.1s linear;
        }

        .fuel-fill.low {
            background: linear-gradient(90deg, #e34d2b, #ff1111);
            animation: pulseLow 0.8s infinite;
        }

        @keyframes pulseLow {
            0% { opacity: 1; filter: brightness(1);}
            50% { opacity: 0.7; filter: brightness(1.6);}
            100% { opacity: 1; filter: brightness(1);}
        }

        .lives-icons {
            display: flex;
            gap: 8px;
            font-size: 1.6rem;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
        }

        .restart-btn, .shop-btn {
            background: #e2b13b;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 1.1rem;
            padding: 6px 18px;
            border-radius: 40px;
            cursor: pointer;
            color: #1f2c0c;
            transition: 0.1s linear;
            box-shadow: 0 4px 0 #7a4d18;
        }

        .shop-btn {
            background: #4a6a2a;
            box-shadow: 0 4px 0 #2a3a1a;
            color: #ffecb3;
        }

        .restart-btn:active, .shop-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #7a4d18;
        }

        .shop-btn:active {
            box-shadow: 0 1px 0 #2a3a1a;
        }

        .controls {
            margin-top: 12px;
            display: flex;
            justify-content: center;
            gap: 35px;
            background: #0a1f0ad9;
            border-radius: 80px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            padding: 8px 25px;
        }

        .ctrl-btn {
            background: #2e2c2a;
            color: #ffdd99;
            font-size: 2rem;
            font-weight: bold;
            padding: 5px 20px;
            border-radius: 60px;
            cursor: pointer;
            user-select: none;
            transition: 0.05s linear;
            box-shadow: 0 3px 0 #7a5a2a;
            font-family: monospace;
        }

        .ctrl-btn:active {
            transform: translateY(2px);
            box-shadow: none;
        }

        @media (max-width: 700px) {
            .ctrl-btn { font-size: 1.8rem; padding: 5px 18px;}
            .fuel-bar-bg { width: 130px; }
            .info-panel { gap: 12px; padding: 8px 16px;}
            .lives-icons { font-size: 1.2rem; gap: 4px; }
            .restart-btn, .shop-btn { font-size: 0.9rem; padding: 5px 12px; }
            .action-buttons { gap: 8px; }
        }
        
        .gameover-restart {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #f5b042, #c77d1a);
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 1.5rem;
            padding: 12px 35px;
            border-radius: 60px;
            cursor: pointer;
            color: #1f2c0c;
            transition: 0.1s linear;
            box-shadow: 0 8px 0 #6b3f0c;
            letter-spacing: 2px;
            z-index: 100;
            display: none;
        }

        .gameover-restart:active {
            transform: translateX(-50%) translateY(4px);
            box-shadow: 0 3px 0 #6b3f0c;
        }

        .shop-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.2s;
        }

        .shop-modal.active {
            visibility: visible;
            opacity: 1;
        }

        .shop-content {
            background: linear-gradient(145deg, #1e2b1a, #0a1708);
            border-radius: 50px;
            padding: 25px 30px;
            max-width: 550px;
            width: 90%;
            text-align: center;
            border: 3px solid #ffcd7e;
            box-shadow: 0 30px 45px rgba(0,0,0,0.8);
            animation: modalPop 0.3s ease;
        }

        @keyframes modalPop {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .shop-content h2 {
            color: #ffdd99;
            font-size: 2rem;
            margin: 0 0 10px;
        }

        .shop-coins {
            background: #021005;
            display: inline-block;
            padding: 8px 25px;
            border-radius: 40px;
            margin-bottom: 20px;
            font-size: 1.3rem;
            color: #ffd966;
        }

        .color-options {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
            max-height: 350px;
            overflow-y: auto;
            padding: 5px;
        }

        .color-card {
            background: #2a2a1a;
            border-radius: 20px;
            padding: 12px;
            width: 100px;
            cursor: pointer;
            transition: 0.1s;
            border: 2px solid transparent;
        }

        .color-card.selected {
            border-color: #ffcc44;
            background: #3a3a2a;
            transform: scale(1.02);
        }

        .color-card.locked {
            opacity: 0.6;
            cursor: pointer;
        }

        .color-preview {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            margin: 0 auto 8px;
            border: 2px solid #aaa;
        }

        .color-name {
            color: #ffecb3;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .color-price {
            font-size: 0.7rem;
            color: #ffcc44;
            margin-top: 5px;
        }

        .shop-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }

        .shop-close, .shop-back {
            background: #a53f2a;
            border: none;
            font-size: 1.1rem;
            padding: 8px 25px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.1s;
        }

        .shop-back {
            background: #4a6a2a;
        }

        .intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .intro-card {
            background: linear-gradient(145deg, #1e2b1a, #0a1708);
            border-radius: 70px;
            padding: 30px 40px;
            max-width: 550px;
            width: 90%;
            text-align: center;
            border: 3px solid #ffcd7e;
            box-shadow: 0 30px 45px rgba(0,0,0,0.7);
            animation: floatIn 0.5s ease;
        }
        
        @keyframes floatIn {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(40px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        
        .intro-card h1 {
            font-size: 3.2rem;
            margin: 0;
            background: linear-gradient(135deg, #ffdb7e, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 3px;
        }
        
        .intro-card .sub {
            color: #ddcc88;
            font-size: 1rem;
            border-top: 1px solid #ffcc66;
            border-bottom: 1px solid #ffcc66;
            display: inline-block;
            padding: 6px 18px;
            margin: 12px 0;
        }
        
        .features {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin: 25px 0;
            flex-wrap: wrap;
        }
        
        .feature {
            background: #00000066;
            border-radius: 60px;
            padding: 10px 15px;
            font-weight: bold;
            color: #ffe0aa;
            font-size: 0.9rem;
        }
        
        .start-btn {
            background: radial-gradient(circle at 30% 10%, #f5b042, #c77d1a);
            border: none;
            font-size: 2rem;
            font-weight: bold;
            font-family: monospace;
            padding: 12px 38px;
            margin: 20px 0 10px;
            border-radius: 60px;
            color: #271d06;
            cursor: pointer;
            box-shadow: 0 8px 0 #6b3f0c;
            transition: 0.07s linear;
            letter-spacing: 3px;
        }
        
        .control-hint {
            background: #2a2416aa;
            border-radius: 40px;
            padding: 8px;
            font-size: 0.85rem;
            color: #ffdd99;
            margin-top: 15px;
        }
        
        .control-hint span {
            display: inline-block;
            background: #00000088;
            padding: 4px 12px;
            border-radius: 50px;
            margin: 0 4px;
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="600" height="550"></canvas>
        <div class="info-panel">
            <div class="score-area">
                <span>💰</span>
                <span id="scoreValue">0</span>
            </div>
            <div class="lives-area">
                <span>💥</span>
                <div class="lives-icons" id="livesIcons">❤️ ❤️</div>
            </div>
            <div class="fuel-area">
                <span>⛽</span>
                <div class="fuel-bar-bg">
                    <div id="fuelFill" class="fuel-fill" style="width: 100%"></div>
                </div>
            </div>
            <div class="action-buttons">
                <button class="restart-btn" id="restartButton">🏁 REINICIAR</button>
                <button class="shop-btn" id="shopButton">🛒 LOJA</button>
            </div>
        </div>
        <div class="controls">
            <div class="ctrl-btn" data-dir="left">◀ ESQ</div>
            <div class="ctrl-btn" data-dir="right">DIR ▶</div>
        </div>
        <div style="text-align: center; margin-top: 10px; font-size: 12px; color: #bada77;">← → ou A/D | 🌳 CENÁRIO COM ÁRVORES E PRÉDIOS! 🏢</div>
    </div>
</div>

<button id="gameoverRestartBtn" class="gameover-restart">🏁 REINICIAR JOGO 🏁</button>

<div id="shopModal" class="shop-modal">
    <div class="shop-content">
        <h2>🎨 LOJA DE PINTURA 🎨</h2>
        <div class="shop-coins">💰 <span id="shopCoinsAmount">0</span> moedas</div>
        <div class="color-options" id="colorOptions"></div>
        <div class="shop-message" id="shopMessage"></div>
        <div class="shop-buttons">
            <button class="shop-back" id="backShopBtn">◀ VOLTAR</button>
            <button class="shop-close" id="closeShopBtn">FECHAR</button>
        </div>
    </div>
</div>

<div id="introScreen" class="intro-overlay">
    <div class="intro-card">
        <h1>🏎️ CORRIDA TURBO ⛽</h1>
        <div class="sub">5 PISTAS • LOJA DE CORES • CENÁRIO URBANO</div>
        <div class="features">
            <div class="feature">🚗 5 Estradas</div>
            <div class="feature">💰 Moedas compram cores!</div>
            <div class="feature">🌳 Árvores e Prédios</div>
            <div class="feature">🏙️ Cenário Bonito</div>
        </div>
        <button class="start-btn" id="startGameBtn">▶ COMEÇAR ◀</button>
        <div class="control-hint">
            🎮 Controles: <span>◀ ESQ</span> <span>▶ DIR</span> ou <span>A / D</span>
        </div>
    </div>
</div>

<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const colors = [
            { id: 0, name: "AZUL PADRÃO", code: "#2ed0ff", price: 0, unlocked: true },
            { id: 1, name: "VERMELHO FOGO", code: "#e34234", price: 150, unlocked: false },
            { id: 2, name: "VERDE MÁFIA", code: "#32a852", price: 200, unlocked: false },
            { id: 3, name: "AMARELO OURO", code: "#e8b317", price: 250, unlocked: false },
            { id: 4, name: "PRETO FÚRIA", code: "#2a2a2a", price: 300, unlocked: false },
            { id: 5, name: "ROXO NEBULOSA", code: "#9b30ff", price: 350, unlocked: false },
            { id: 6, name: "LARANJA CHAMA", code: "#ff7711", price: 280, unlocked: false }
        ];
        
        let currentColorIndex = 0;
        let totalCoins = 0;
        
        const LANE_COUNT = 5;
        const LANE_WIDTH = canvas.width / LANE_COUNT;
        const CAR_WIDTH = 52;
        const CAR_HEIGHT = 82;
        const PLAYER_Y = canvas.height - CAR_HEIGHT - 15;
        
        let gameActive = false;
        let gameRunning = true;
        let lives = 2;
        let damageCooldown = 0;
        let score = 0;
        let fuel = 100;
        
        let currentLane = 2;
        let targetLane = 2;
        let animProgress = 1;
        let animSpeed = 0.22;
        
        let currentX = getXFromLane(currentLane, CAR_WIDTH);
        let targetX = currentX;
        
        let obstacles = [];
        let coinsItems = [];
        let fuelItems = [];
        let smokeParticles = [];
        
        let frameCounter = 0;
        let spawnGap = 38;
        let baseSpeed = 3.4;
        let currentSpeed = baseSpeed;
        let fuelLowThreshold = 40;
        
        // Elementos visuais estáticos do cenário
        let sceneryOffset = 0;
        
        const gameoverRestartBtn = document.getElementById('gameoverRestartBtn');
        const shopModal = document.getElementById('shopModal');
        const shopCoinsSpan = document.getElementById('shopCoinsAmount');
        const shopMessage = document.getElementById('shopMessage');
        const colorOptionsDiv = document.getElementById('colorOptions');
        
        function loadProgress() {
            const savedCoins = localStorage.getItem('racingTotalCoins');
            if(savedCoins !== null) totalCoins = parseInt(savedCoins);
            const savedColors = localStorage.getItem('racingUnlockedColors');
            if(savedColors !== null) {
                const unlocked = JSON.parse(savedColors);
                colors.forEach((c, idx) => { if(unlocked[idx]) c.unlocked = true; });
            }
            const savedCurrentColor = localStorage.getItem('racingCurrentColor');
            if(savedCurrentColor !== null) currentColorIndex = parseInt(savedCurrentColor);
            updateScoreUI();
        }
        
        function saveProgress() {
            localStorage.setItem('racingTotalCoins', totalCoins);
            const unlockedStatus = colors.map(c => c.unlocked);
            localStorage.setItem('racingUnlockedColors', JSON.stringify(unlockedStatus));
            localStorage.setItem('racingCurrentColor', currentColorIndex);
        }
        
        function addCoins(amount) {
            totalCoins += amount;
            saveProgress();
            updateScoreUI();
        }
        
        function updateScoreUI() {
            document.getElementById('scoreValue').innerText = Math.floor(totalCoins);
            if(shopCoinsSpan) shopCoinsSpan.innerText = totalCoins;
        }
        
        function getCurrentCarColor() { return colors[currentColorIndex].code; }
        function getCarSecondaryColor() {
            let color = getCurrentCarColor();
            if(color === "#2ed0ff") return "#1099cc";
            if(color === "#e34234") return "#a1251a";
            if(color === "#32a852") return "#1f6b32";
            if(color === "#e8b317") return "#b88a0c";
            if(color === "#2a2a2a") return "#111111";
            if(color === "#9b30ff") return "#6a1fb0";
            if(color === "#ff7711") return "#cc5500";
            return "#1099cc";
        }
        
        function renderShop() {
            colorOptionsDiv.innerHTML = '';
            colors.forEach((color, idx) => {
                const card = document.createElement('div');
                card.className = `color-card ${color.unlocked ? 'unlocked' : 'locked'} ${currentColorIndex === idx ? 'selected' : ''}`;
                card.innerHTML = `
                    <div class="color-preview" style="background: ${color.code};"></div>
                    <div class="color-name">${color.name}</div>
                    ${!color.unlocked ? `<div class="color-price">💰 ${color.price}</div>` : '<div class="color-price">✅ COMPRADA</div>'}
                `;
                card.addEventListener('click', () => tryBuyColor(idx));
                colorOptionsDiv.appendChild(card);
            });
        }
        
        function tryBuyColor(colorId) {
            const color = colors[colorId];
            if(color.unlocked) {
                currentColorIndex = colorId;
                saveProgress();
                renderShop();
                shopMessage.innerText = `🎨 Cor alterada para ${color.name}!`;
                setTimeout(() => { if(shopMessage) shopMessage.innerText = ''; }, 1500);
                return;
            }
            if(totalCoins >= color.price) {
                totalCoins -= color.price;
                color.unlocked = true;
                currentColorIndex = colorId;
                saveProgress();
                updateScoreUI();
                renderShop();
                shopMessage.innerText = `✅ Você comprou ${color.name}! Usando agora.`;
                setTimeout(() => { if(shopMessage) shopMessage.innerText = ''; }, 1500);
            } else {
                shopMessage.innerText = `❌ Moedas insuficientes! Faltam ${color.price - totalCoins} moedas.`;
                setTimeout(() => { if(shopMessage) shopMessage.innerText = ''; }, 1500);
            }
        }
        
        function openShop() { if(!gameActive) return; renderShop(); shopCoinsSpan.innerText = totalCoins; shopModal.classList.add('active'); }
        function closeShop() { shopModal.classList.remove('active'); }
        
        function getXFromLane(lane, width) {
            let laneCenterX = lane * LANE_WIDTH + LANE_WIDTH/2;
            return laneCenterX - width/2;
        }
        
        function updateTargetPosition() {
            targetLane = Math.max(0, Math.min(LANE_COUNT - 1, targetLane));
            targetX = getXFromLane(targetLane, CAR_WIDTH);
        }
        
        function updateAnimation() {
            if (animProgress < 1) {
                animProgress += animSpeed;
                if (animProgress >= 1) { animProgress = 1; currentLane = targetLane; }
                currentX = currentX + (targetX - currentX) * animSpeed;
            } else { currentLane = targetLane; currentX = targetX; }
        }
        
        function setLane(lane) {
            if (lane === targetLane) return;
            targetLane = Math.max(0, Math.min(LANE_COUNT - 1, lane));
            updateTargetPosition();
            animProgress = 0;
        }
        
        function moveLeft() { if (!gameActive || !gameRunning) return; if (targetLane > 0) setLane(targetLane - 1); }
        function moveRight() { if (!gameActive || !gameRunning) return; if (targetLane < LANE_COUNT - 1) setLane(targetLane + 1); }
        
        function updateLivesUI() {
            const livesDiv = document.getElementById('livesIcons');
            if(lives === 2) livesDiv.innerHTML = '❤️ ❤️';
            else if(lives === 1) livesDiv.innerHTML = '💨 ❤️';
            else livesDiv.innerHTML = '💀 💀';
        }
        
        function addSmokeEffect() {
            for(let i = 0; i < 18; i++) {
                smokeParticles.push({
                    x: currentX + CAR_WIDTH/2 + (Math.random() - 0.5) * 30,
                    y: PLAYER_Y + CAR_HEIGHT - 10 + Math.random() * 20,
                    vx: (Math.random() - 0.5) * 2.2,
                    vy: -Math.random() * 2.5 - 1,
                    life: 0.8 + Math.random() * 0.6,
                    size: 5 + Math.random() * 9
                });
            }
        }
        
        function updateSmoke() {
            for(let i = 0; i < smokeParticles.length; i++) {
                smokeParticles[i].x += smokeParticles[i].vx;
                smokeParticles[i].y += smokeParticles[i].vy;
                smokeParticles[i].life -= 0.025;
                if(smokeParticles[i].life <= 0 || smokeParticles[i].y > canvas.height + 50) smokeParticles.splice(i,1), i--;
            }
        }
        
        function drawSmoke() {
            for(let p of smokeParticles) {
                let alpha = Math.min(0.6, p.life * 0.8);
                ctx.fillStyle = `rgba(80, 70, 60, ${alpha})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size * (0.6 + p.life * 0.6), 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = `rgba(140, 120, 100, ${alpha * 0.5})`;
                ctx.beginPath(); ctx.arc(p.x-2, p.y-1, p.size * 0.5, 0, Math.PI*2); ctx.fill();
            }
        }
        
        // CENÁRIO COM ÁRVORES E PRÉDIOS
        function drawScenery() {
            // Céu
            ctx.fillStyle = "#87CEEB";
            ctx.fillRect(0, 0, canvas.width, 40);
            ctx.fillStyle = "#6BB3D9";
            ctx.fillRect(0, 40, canvas.width, 60);
            
            // Nuvens
            ctx.fillStyle = "#ffffffcc";
            ctx.beginPath();
            ctx.ellipse(80 + sceneryOffset * 0.3, 30, 35, 25, 0, 0, Math.PI*2);
            ctx.ellipse(110 + sceneryOffset * 0.3, 25, 30, 22, 0, 0, Math.PI*2);
            ctx.ellipse(55 + sceneryOffset * 0.3, 28, 28, 20, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(450 - sceneryOffset * 0.2, 20, 40, 28, 0, 0, Math.PI*2);
            ctx.ellipse(490 - sceneryOffset * 0.2, 18, 32, 24, 0, 0, Math.PI*2);
            ctx.ellipse(420 - sceneryOffset * 0.2, 22, 30, 22, 0, 0, Math.PI*2);
            ctx.fill();
            
            // PRÉDIOS (lado esquerdo)
            ctx.fillStyle = "#8B7355";
            ctx.fillRect(5, 65, 40, 120);
            ctx.fillStyle = "#A0522D";
            for(let i=0; i<8; i++) {
                ctx.fillRect(10 + i*4, 75 + (i%3)*8, 3, 6);
            }
            ctx.fillStyle = "#CD853F";
            ctx.fillRect(50, 80, 35, 105);
            for(let i=0; i<7; i++) {
                ctx.fillRect(55 + i*4, 90 + (i%2)*10, 3, 5);
            }
            
            // PRÉDIOS (lado direito)
            ctx.fillStyle = "#6B8E6B";
            ctx.fillRect(canvas.width-55, 70, 48, 115);
            for(let i=0; i<10; i++) {
                ctx.fillStyle = "#FFD700";
                ctx.fillRect(canvas.width-48 + i*4, 80 + (i%3)*6, 2, 4);
            }
            ctx.fillStyle = "#778899";
            ctx.fillRect(canvas.width-90, 85, 35, 100);
            for(let i=0; i<6; i++) {
                ctx.fillStyle = "#B0C4DE";
                ctx.fillRect(canvas.width-85 + i*5, 95 + (i%2)*8, 2, 5);
            }
            
            // ÁRVORES (lado esquerdo - troncos)
            ctx.fillStyle = "#8B4513";
            ctx.fillRect(8, 175, 10, 35);
            ctx.fillRect(35, 185, 8, 30);
            ctx.fillRect(68, 178, 9, 32);
            // Copas das árvores
            ctx.fillStyle = "#228B22";
            ctx.beginPath(); ctx.arc(13, 172, 12, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#2E8B57";
            ctx.beginPath(); ctx.arc(39, 182, 10, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#32CD32";
            ctx.beginPath(); ctx.arc(72, 175, 11, 0, Math.PI*2); ctx.fill();
            
            // ÁRVORES (lado direito)
            ctx.fillStyle = "#8B4513";
            ctx.fillRect(canvas.width-35, 180, 9, 32);
            ctx.fillRect(canvas.width-68, 173, 10, 38);
            ctx.fillRect(canvas.width-18, 190, 7, 25);
            ctx.fillStyle = "#228B22";
            ctx.beginPath(); ctx.arc(canvas.width-30, 177, 11, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#2E8B57";
            ctx.beginPath(); ctx.arc(canvas.width-63, 170, 13, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#32CD32";
            ctx.beginPath(); ctx.arc(canvas.width-14, 187, 9, 0, Math.PI*2); ctx.fill();
            
            // Grama
            ctx.fillStyle = "#4CAF50";
            ctx.fillRect(0, canvas.height-55, canvas.width, 55);
            ctx.fillStyle = "#388E3C";
            for(let i=0; i<20; i++) {
                ctx.fillRect(i*35, canvas.height-50, 3, 12);
            }
        }
        
        function drawRoad() {
            // Asfalto
            ctx.fillStyle = "#2c2c2c";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Faixa verde na lateral esquerda
            ctx.fillStyle = "#4CAF50";
            ctx.fillRect(0, 0, 12, canvas.height);
            ctx.fillStyle = "#388E3C";
            ctx.fillRect(12, 0, 4, canvas.height);
            
            // Faixa verde na lateral direita
            ctx.fillStyle = "#4CAF50";
            ctx.fillRect(canvas.width-12, 0, 12, canvas.height);
            ctx.fillStyle = "#388E3C";
            ctx.fillRect(canvas.width-16, 0, 4, canvas.height);
            
            // Linhas divisórias verticais entre faixas
            for(let i=1; i<LANE_COUNT; i++) {
                let x = i * LANE_WIDTH;
                ctx.beginPath();
                ctx.strokeStyle = "#ffdd99";
                ctx.lineWidth = 3;
                ctx.setLineDash([18, 28]);
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            
            ctx.setLineDash([]);
            
            // Linhas tracejadas centrais de cada faixa
            ctx.lineWidth = 2.5;
            ctx.strokeStyle = "#ffe6b3";
            ctx.setLineDash([15, 25]);
            for(let i = 0; i < LANE_COUNT; i++) {
                let centerX = i * LANE_WIDTH + LANE_WIDTH/2;
                ctx.beginPath();
                ctx.moveTo(centerX, 0);
                ctx.lineTo(centerX, canvas.height);
                ctx.stroke();
            }
            ctx.setLineDash([]);
            
            // Meio-fio
            ctx.strokeStyle = "#c9a53b";
            ctx.lineWidth = 3;
            ctx.strokeRect(15, 4, canvas.width-30, canvas.height-8);
        }
        
        function drawPlayer() {
            const mainColor = getCurrentCarColor();
            const secColor = getCarSecondaryColor();
            if(lives === 1 && gameActive) {
                ctx.fillStyle = "#cc8844";
                ctx.fillRect(currentX, PLAYER_Y, CAR_WIDTH, CAR_HEIGHT);
            } else {
                ctx.fillStyle = mainColor;
                ctx.fillRect(currentX, PLAYER_Y, CAR_WIDTH, CAR_HEIGHT);
                ctx.fillStyle = secColor;
                ctx.fillRect(currentX+8, PLAYER_Y+8, CAR_WIDTH-16, 18);
            }
            ctx.fillStyle = "#ffcc44";
            ctx.fillRect(currentX+12, PLAYER_Y+CAR_HEIGHT-22, CAR_WIDTH-24, 12);
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(currentX+6, PLAYER_Y+32, 12, 18);
            ctx.fillRect(currentX+CAR_WIDTH-18, PLAYER_Y+32, 12, 18);
            ctx.fillStyle = "#ffdd88";
            ctx.fillRect(currentX+2, PLAYER_Y+CAR_HEIGHT-12, 8, 8);
            ctx.fillRect(currentX+CAR_WIDTH-10, PLAYER_Y+CAR_HEIGHT-12, 8, 8);
            ctx.fillStyle = "#101010";
            ctx.fillRect(currentX+4, PLAYER_Y+12, 8, 12);
            ctx.fillRect(currentX+CAR_WIDTH-12, PLAYER_Y+12, 8, 12);
            ctx.fillStyle = "#f4c542";
            ctx.fillRect(currentX+22, PLAYER_Y+65, 8, 8);
        }
        
        function getXFromLaneInterpolated(obs) {
            let startX = getXFromLane(obs.startLane, CAR_WIDTH);
            let endX = getXFromLane(obs.targetLane, CAR_WIDTH);
            return startX + (endX - startX) * obs.animProgress;
        }
        
        function drawObstacle(obs) { 
            let drawX = obs.isAnimating ? getXFromLaneInterpolated(obs) : getXFromLane(obs.lane, CAR_WIDTH);
            let y = obs.y; 
            ctx.fillStyle = "#9a2a2a"; 
            ctx.fillRect(drawX, y, CAR_WIDTH, CAR_HEIGHT); 
            ctx.fillStyle = "#551111"; 
            ctx.fillRect(drawX+6, y+10, CAR_WIDTH-12, 20); 
            ctx.fillStyle = "#2b1a1a"; 
            ctx.fillRect(drawX+12, y+48, CAR_WIDTH-24, 16); 
            ctx.fillStyle = "#ffaa66"; 
            ctx.fillRect(drawX+4, y+CAR_HEIGHT-12, 8, 8); 
            ctx.fillRect(drawX+CAR_WIDTH-12, y+CAR_HEIGHT-12, 8, 8); 
            ctx.fillStyle = "#dd8844"; 
            ctx.fillRect(drawX+20, y+28, 12, 12);
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(drawX+12, y+25, 10, 8);
            ctx.fillRect(drawX+CAR_WIDTH-22, y+25, 10, 8);
            ctx.fillStyle = "#000000";
            ctx.fillRect(drawX+14, y+27, 5, 5);
            ctx.fillRect(drawX+CAR_WIDTH-20, y+27, 5, 5);
        }
        
        function drawCoin(coin) { let x = getXFromLane(coin.lane, 28); let y = coin.y; ctx.beginPath(); ctx.arc(x+14, y+14, 12, 0, Math.PI*2); ctx.fillStyle = "#f5c542"; ctx.fill(); ctx.beginPath(); ctx.arc(x+14, y+14, 8, 0, Math.PI*2); ctx.fillStyle = "#e5b82b"; ctx.fill(); ctx.fillStyle = "#ffec80"; ctx.font = "bold 18px monospace"; ctx.fillText("💰", x+6, y+22); }
        function drawFuelItem(fuelIt) { let x = getXFromLane(fuelIt.lane, 36); let y = fuelIt.y; ctx.fillStyle = "#22aa55"; ctx.fillRect(x, y, 36, 38); ctx.fillStyle = "#168f44"; ctx.fillRect(x+6, y+6, 24, 26); ctx.fillStyle = "#ffffbb"; ctx.font = "bold 22px sans-serif"; ctx.fillText("⛽", x+6, y+29); ctx.fillStyle = "#ff7777"; ctx.fillRect(x+10, y+2, 16, 8); ctx.fillStyle = "#ffee88"; ctx.font = "bold 10px monospace"; ctx.fillText("+32", x+10, y+50); }
        function updateFuelBarUI() { const fillDiv = document.getElementById('fuelFill'); let percent = Math.max(0, Math.min(100, fuel)) / 100 * 100; fillDiv.style.width = percent + "%"; if(fuel <= 20) fillDiv.classList.add('low'); else fillDiv.classList.remove('low'); }
        function rectCollide(r1, r2) { return !(r2.x > r1.x+r1.w || r2.x+r2.w < r1.x || r2.y > r1.y+r1.h || r2.y+r2.h < r1.y); }
        
        function showGameOverButton(show) { gameoverRestartBtn.style.display = show ? 'block' : 'none'; }
        
        function updateEnemyMovement() {
            for(let i = 0; i < obstacles.length; i++) {
                const obs = obstacles[i];
                if(obs.isAnimating) {
                    obs.animProgress += animSpeed * 0.7;
                    if(obs.animProgress >= 1) {
                        obs.animProgress = 1;
                        obs.isAnimating = false;
                        obs.lane = obs.targetLane;
                        delete obs.startLane;
                    }
                    continue;
                }
                if(obs.hasSwitched) continue;
                const isLeftNeighbor = (obs.lane === targetLane - 1);
                const isRightNeighbor = (obs.lane === targetLane + 1);
                const isNeighbor = isLeftNeighbor || isRightNeighbor;
                if(!isNeighbor) continue;
                const distanceToPlayer = Math.abs(obs.y - PLAYER_Y);
                const isFarEnough = (obs.y < PLAYER_Y - 100) && (obs.y > PLAYER_Y - 280);
                if(isFarEnough && Math.random() < 0.20) {
                    obs.startLane = obs.lane;
                    obs.targetLane = targetLane;
                    obs.animProgress = 0;
                    obs.isAnimating = true;
                    obs.hasSwitched = true;
                }
            }
        }
        
        function updateGame() {
            if(!gameActive || !gameRunning) return;
            updateAnimation();
            if(damageCooldown > 0) damageCooldown--;
            fuel -= 0.115;
            if(fuel <= 0) { gameRunning = false; fuel = 0; updateFuelBarUI(); showGameOverButton(true); return; }
            updateFuelBarUI();
            if(score > 200) currentSpeed = Math.min(6.6, baseSpeed + Math.floor(score/160));
            else if(score > 70) currentSpeed = Math.min(5.5, baseSpeed + 1.2);
            else currentSpeed = baseSpeed;
            
            sceneryOffset = (sceneryOffset + currentSpeed * 0.5) % 300;
            updateEnemyMovement();
            
            for(let i=0; i<obstacles.length; i++) { obstacles[i].y += currentSpeed; if(obstacles[i].y > canvas.height + 200) obstacles.splice(i,1), i--; }
            for(let i=0; i<coinsItems.length; i++) { coinsItems[i].y += currentSpeed; if(coinsItems[i].y > canvas.height + 100) coinsItems.splice(i,1), i--; }
            for(let i=0; i<fuelItems.length; i++) { fuelItems[i].y += currentSpeed; if(fuelItems[i].y > canvas.height + 100) fuelItems.splice(i,1), i--; }
            
            const playerRect = { x: currentX, y: PLAYER_Y, w: CAR_WIDTH, h: CAR_HEIGHT };
            for(let i=0; i<obstacles.length; i++) {
                let obsX;
                if(obstacles[i].isAnimating) {
                    let startX = getXFromLane(obstacles[i].startLane, CAR_WIDTH);
                    let endX = getXFromLane(obstacles[i].targetLane, CAR_WIDTH);
                    obsX = startX + (endX - startX) * obstacles[i].animProgress;
                } else {
                    obsX = getXFromLane(obstacles[i].lane, CAR_WIDTH);
                }
                let obsRect = { x: obsX, y: obstacles[i].y, w: CAR_WIDTH, h: CAR_HEIGHT };
                if(rectCollide(playerRect, obsRect)) {
                    if(damageCooldown <= 0) {
                        lives--; updateLivesUI();
                        if(lives <= 0) { gameRunning = false; showGameOverButton(true); return; }
                        addSmokeEffect(); damageCooldown = 35; obstacles.splice(i,1); i--;
                    } else { obstacles.splice(i,1); i--; }
                }
            }
            
            for(let i=0; i<coinsItems.length; i++) {
                let coinX = getXFromLane(coinsItems[i].lane, 28);
                let coinRect = { x: coinX, y: coinsItems[i].y, w: 28, h: 28 };
                if(rectCollide(playerRect, coinRect)) {
                    score += 15;
                    addCoins(15);
                    coinsItems.splice(i,1); i--;
                }
            }
            
            for(let i=0; i<fuelItems.length; i++) {
                let fuelX = getXFromLane(fuelItems[i].lane, 36);
                let fuelRect = { x: fuelX, y: fuelItems[i].y, w: 36, h: 38 };
                if(rectCollide(playerRect, fuelRect)) { fuel = Math.min(100, fuel + 32); updateFuelBarUI(); fuelItems.splice(i,1); i--; }
            }
            
            frameCounter++;
            let dynamicSpawn = Math.max(28, spawnGap - Math.floor(score / 280));
            if(frameCounter >= dynamicSpawn) {
                frameCounter = 0;
                let rand = Math.random();
                let isFuelLow = (fuel < fuelLowThreshold);
                
                if(isFuelLow && rand < 0.5) {  
                    let laneChoice = Math.floor(Math.random() * LANE_COUNT);
                    fuelItems.push({ lane: laneChoice, y: -45 - Math.random() * 40 });
                    if(Math.random() < 0.4) { let extraLane = (laneChoice+2) % LANE_COUNT; coinsItems.push({ lane: extraLane, y: -35 }); }
                } 
                else {
                    if(rand < 0.55) {
                        let laneChoice = Math.floor(Math.random() * LANE_COUNT);
                        obstacles.push({ 
                            lane: laneChoice, 
                            y: -CAR_HEIGHT - Math.random() * 50,
                            hasSwitched: false,
                            isAnimating: false
                        });
                    } 
                    else {
                        let laneChoice = Math.floor(Math.random() * LANE_COUNT);
                        coinsItems.push({ lane: laneChoice, y: -35 - Math.random() * 30 });
                        if(Math.random() < 0.25) { let secondLane = (laneChoice+3)%LANE_COUNT; coinsItems.push({ lane: secondLane, y: -45 }); }
                    }
                }
                
                if(isFuelLow && Math.random() < 0.3) { let emergencyLane = Math.floor(Math.random() * LANE_COUNT); fuelItems.push({ lane: emergencyLane, y: -30 }); }
            }
            
            if(fuel < 28 && gameRunning) { let hasFuelOnScreen = fuelItems.length > 0; if(!hasFuelOnScreen && Math.random() < 0.03) { let lane = Math.floor(Math.random() * LANE_COUNT); fuelItems.push({ lane: lane, y: -50 }); } }
            updateSmoke();
        }
        
        function draw() {
            drawScenery();
            drawRoad();
            for(let c of coinsItems) drawCoin(c);
            for(let f of fuelItems) drawFuelItem(f);
            for(let obs of obstacles) drawObstacle(obs);
            drawSmoke();
            drawPlayer();
            if(damageCooldown > 0 && gameActive && gameRunning) { ctx.globalAlpha = 0.6; ctx.fillStyle = "#ffffaa"; ctx.fillRect(currentX-3, PLAYER_Y-3, CAR_WIDTH+6, CAR_HEIGHT+6); ctx.globalAlpha = 1; }
            if(gameActive && fuel <= 30 && gameRunning) { ctx.font = "bold 18px 'Segoe UI'"; ctx.fillStyle = "#ff8844"; ctx.fillText("⚠️ PROCURE ⛽ COMBUSTÍVEL! ⚠️", canvas.width/2-145, 55); }
            if(!gameActive) { ctx.globalAlpha = 0.7; ctx.fillStyle = "#021005cc"; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.globalAlpha = 1; ctx.font = "bold 28px monospace"; ctx.fillStyle = "#ffdd99"; ctx.fillText("🏁 APERTE 'COMEÇAR' 🏁", canvas.width/2-170, canvas.height/2); }
            else if(!gameRunning) { ctx.font = "800 44px system-ui"; ctx.fillStyle = "#f0d050"; ctx.shadowBlur = 8; ctx.fillText("GAME OVER", canvas.width/2-135, canvas.height/2-50); ctx.font = "bold 16px monospace"; ctx.fillStyle = "#ffe5aa"; ctx.fillText("Clique em REINICIAR", canvas.width/2-105, canvas.height/2+30); ctx.shadowBlur = 0; }
            ctx.font = "bold 18px 'Courier New'"; ctx.fillStyle = "#feffcf"; ctx.fillText("💰 "+Math.floor(totalCoins), 18, 43); ctx.fillStyle = "#ffffbb"; ctx.fillText("⛽ "+Math.floor(fuel)+"%", canvas.width-95, 43);
            if(animProgress < 1 && gameActive) { ctx.font = "italic 12px monospace"; ctx.fillStyle = "#aaffdd"; ctx.fillText("✧ DESLIZANDO ✧", canvas.width/2-55, PLAYER_Y-8); }
        }
        
        function resetGameState() {
            obstacles = []; coinsItems = []; fuelItems = []; smokeParticles = [];
            score = 0; fuel = 100; lives = 2; damageCooldown = 0;
            targetLane = 2; currentLane = 2; animProgress = 1;
            currentX = getXFromLane(2, CAR_WIDTH); targetX = currentX;
            currentSpeed = baseSpeed; frameCounter = 0; gameRunning = true;
            updateFuelBarUI(); updateLivesUI(); showGameOverButton(false);
        }
        
        function startMatch() { resetGameState(); gameActive = true; gameRunning = true; document.getElementById('introScreen').style.display = 'none'; showGameOverButton(false); }
        function restartMatch() { if(!gameActive) startMatch(); else { resetGameState(); gameRunning = true; } }
        
        function gameLoop() { if(gameActive && gameRunning) updateGame(); draw(); requestAnimationFrame(gameLoop); }
        
        function handleKey(e) { if(!gameActive) return; const key = e.key; if(key === 'ArrowLeft' || key === 'a' || key === 'A') { moveLeft(); e.preventDefault(); } else if(key === 'ArrowRight' || key === 'd' || key === 'D') { moveRight(); e.preventDefault(); } }
        
        function setupControls() {
            const leftBtn = document.querySelector('[data-dir="left"]');
            const rightBtn = document.querySelector('[data-dir="right"]');
            if(leftBtn) { leftBtn.addEventListener('click', (e) => { e.preventDefault(); moveLeft(); }); leftBtn.addEventListener('touchstart', (e) => { e.preventDefault(); moveLeft(); }); }
            if(rightBtn) { rightBtn.addEventListener('click', (e) => { e.preventDefault(); moveRight(); }); rightBtn.addEventListener('touchstart', (e) => { e.preventDefault(); moveRight(); }); }
        }
        
        window.addEventListener('keydown', handleKey);
        document.getElementById('restartButton').addEventListener('click', () => { restartMatch(); });
        document.getElementById('shopButton').addEventListener('click', () => { openShop(); });
        document.getElementById('closeShopBtn').addEventListener('click', () => { closeShop(); });
        document.getElementById('backShopBtn').addEventListener('click', () => { closeShop(); });
        gameoverRestartBtn.addEventListener('click', () => { restartMatch(); });
        document.getElementById('startGameBtn').addEventListener('click', (e) => { e.preventDefault(); startMatch(); });
        setupControls();
        
        loadProgress();
        resetGameState();
        gameActive = false;
        updateLivesUI();
        gameLoop();
    })();
</script>
</body>
</html>
