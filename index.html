<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Corrida Horizontal - Carros com Imagens</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #0a2f2a 0%, #071e1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Courier New', monospace;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            background: #1e3b32;
            border-radius: 56px;
            padding: 20px 25px 25px 25px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,255,255,0.1);
        }

        .race-area {
            position: relative;
            display: inline-block;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 28px;
            box-shadow: 0 12px 28px black;
            cursor: pointer;
            background-color: #2c4b3e;
        }

        .dashboard {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-top: 18px;
            gap: 20px;
            flex-wrap: wrap;
            background: #0f2922c9;
            backdrop-filter: blur(4px);
            border-radius: 60px;
            padding: 12px 24px;
            border: 1px solid #6bb59a;
        }

        .score-box, .best-box {
            background: #03100e;
            padding: 6px 18px;
            border-radius: 40px;
            color: #c6ffd9;
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 0 0 3px #00cc88;
        }

        .score-box span, .best-box span {
            font-size: 1.5rem;
            font-weight: 800;
            color: #f2ff80;
            margin-left: 12px;
        }

        .controls {
            display: flex;
            gap: 20px;
            background: #00000066;
            padding: 6px 20px;
            border-radius: 50px;
        }

        .controls button {
            background: #2b6e5c;
            border: none;
            font-size: 1.8rem;
            font-weight: bold;
            color: white;
            width: 56px;
            height: 56px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 4px 0 #0a352b;
            font-family: monospace;
        }

        .controls button:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #0a352b;
        }

        .reset-btn {
            background: #d9452e;
            box-shadow: 0 4px 0 #752818;
            width: auto;
            padding: 0 28px;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .status {
            background: #010f0cba;
            padding: 6px 18px;
            border-radius: 32px;
            font-weight: bold;
            color: #bcf5e3;
            font-size: 0.9rem;
        }

        .instrucao {
            font-size: 0.75rem;
            margin-top: 12px;
            text-align: center;
            color: #bae5d4;
            background: #0c2c2470;
            border-radius: 50px;
            padding: 8px;
        }

        @media (max-width: 780px) {
            .dashboard { gap: 8px; padding: 10px 15px; }
            .controls button { width: 48px; height: 48px; font-size: 1.5rem; }
            .reset-btn { padding: 0 18px; }
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <div class="race-area">
            <canvas id="gameCanvas" width="1000" height="500"></canvas>
        </div>
        <div class="dashboard">
            <div class="score-box">🏆 SCORE <span id="scoreValue">0</span></div>
            <div class="best-box">⭐ BEST <span id="bestValue">0</span></div>
            <div class="controls">
                <button id="leftBtn">◀</button>
                <button id="rightBtn">▶</button>
                <button id="resetBtn" class="reset-btn">REINICIAR</button>
            </div>
            <div class="status" id="gameStatusText">🏁 CORRENDO</div>
        </div>
        <div class="instrucao">
            🚗 SETAS ESQUERDA / DIREITA | Desvie dos carros inimigos! 5 pistas. Velocidade aumenta com a pontuação!
        </div>
    </div>
</div>

<script>
    (function(){
        // ========== CONFIGURAÇÃO DAS IMAGENS ==========
        // ⚠️ ⚠️ ⚠️ TROQUE AS URLs AQUI PARA ALTERAR AS IMAGENS DOS CARROS ⚠️ ⚠️ ⚠️
        // URL da imagem do seu carro (jogador):
        const PLAYER_IMAGE_URL = 'carromeu.png';
        // URL da imagem dos carros inimigos (todos usarão esta mesma imagem):
        const ENEMY_IMAGE_URL = 'https://static.vecteezy.com/system/resources/thumbnails/044/249/172/small/car-icon-generated-ai-free-png.png';
        // ==============================================
        
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const LANE_COUNT = 5;
        const LANE_HEIGHT = canvas.height / LANE_COUNT;
        const CAR_WIDTH = 70;
        const CAR_HEIGHT = 64;
        const PLAYER_FIXED_X = 90;

        let playerLane = 2;
        let score = 0;
        let bestScore = localStorage.getItem('racingBest5') ? parseInt(localStorage.getItem('racingBest5')) : 0;
        let gameRunning = true;
        let animationId = null;

        let baseSpeed = 3.2;
        let currentSpeed = baseSpeed;
        
        let obstacles = [];
        let spawnCounter = 0;
        let baseSpawnDelay = 40;
        
        // Carregamento das imagens
        let playerImage = new Image();
        let enemyImage = new Image();
        let playerImageLoaded = false;
        let enemyImageLoaded = false;
        
        playerImage.onload = () => { playerImageLoaded = true; };
        enemyImage.onload = () => { enemyImageLoaded = true; };
        playerImage.onerror = () => { console.warn("Erro ao carregar imagem do jogador. Usando fallback."); playerImageLoaded = false; };
        enemyImage.onerror = () => { console.warn("Erro ao carregar imagem dos inimigos. Usando fallback."); enemyImageLoaded = false; };
        
        playerImage.src = PLAYER_IMAGE_URL;
        enemyImage.src = ENEMY_IMAGE_URL;
        
        // Tipos de carros adversários (mantidos apenas para variedade de tamanho/velocidade, mas a imagem será a mesma)
        const carTypes = [
            { name: "Sedan", speedMult: 1.0, width: 70, height: 64 },
            { name: "SUV", speedMult: 0.9, width: 74, height: 66 },
            { name: "Esportivo", speedMult: 1.2, width: 68, height: 62 },
            { name: "Caminhão", speedMult: 0.8, width: 80, height: 70 },
            { name: "Clássico", speedMult: 1.0, width: 70, height: 64 },
            { name: "Taxi", speedMult: 1.1, width: 70, height: 64 },
            { name: "Policia", speedMult: 1.15, width: 70, height: 64 },
            { name: "Mini", speedMult: 0.95, width: 60, height: 58 }
        ];

        const bestSpan = document.getElementById('bestValue');
        const scoreSpan = document.getElementById('scoreValue');
        const gameStatusSpan = document.getElementById('gameStatusText');
        
        bestSpan.innerText = bestScore;
        
        function updateScoreUI() {
            scoreSpan.innerText = Math.floor(score);
        }
        
        function updateBestUI() {
            if(score > bestScore) {
                bestScore = Math.floor(score);
                bestSpan.innerText = bestScore;
                localStorage.setItem('racingBest5', bestScore);
            }
        }
        
        function endGame() {
            if(!gameRunning) return;
            gameRunning = false;
            gameStatusSpan.innerText = '💥 GAME OVER 💥';
            gameStatusSpan.style.color = "#ffaa99";
        }
        
        function resetGame() {
            gameRunning = true;
            score = 0;
            currentSpeed = baseSpeed;
            playerLane = 2;
            obstacles = [];
            spawnCounter = 0;
            updateScoreUI();
            gameStatusSpan.innerText = '🏁 CORRENDO';
            gameStatusSpan.style.color = "#bcf5e3";
        }
        
        function trySpawnObstacle() {
            if(!gameRunning) return;
            
            let dynamicDelay = Math.max(22, baseSpawnDelay - Math.floor((currentSpeed - baseSpeed) * 1.5));
            if(spawnCounter >= dynamicDelay) {
                spawnCounter = 0;
                const lane = Math.floor(Math.random() * LANE_COUNT);
                const carType = carTypes[Math.floor(Math.random() * carTypes.length)];
                const speedVariation = 0.8 + Math.random() * 0.7;
                
                obstacles.push({
                    x: canvas.width,
                    lane: lane,
                    type: carType,
                    width: carType.width,
                    height: carType.height,
                    customSpeed: currentSpeed * carType.speedMult * speedVariation
                });
            } else {
                spawnCounter++;
            }
        }
        
        function updateMovement() {
            if(!gameRunning) return;
            
            let newSpeed = baseSpeed + Math.floor(score / 150) * 0.6;
            newSpeed = Math.min(newSpeed, 10.5);
            currentSpeed = newSpeed;
            
            for(let i=0; i<obstacles.length; i++) {
                obstacles[i].x -= obstacles[i].customSpeed || currentSpeed;
            }
            obstacles = obstacles.filter(obs => obs.x + obs.width > 0);
            
            const playerRect = {
                x: PLAYER_FIXED_X,
                y: playerLane * LANE_HEIGHT + (LANE_HEIGHT/2 - CAR_HEIGHT/2),
                w: CAR_WIDTH,
                h: CAR_HEIGHT
            };
            
            for(let i=0; i<obstacles.length; i++) {
                const obs = obstacles[i];
                const obsRect = {
                    x: obs.x,
                    y: obs.lane * LANE_HEIGHT + (LANE_HEIGHT/2 - obs.height/2),
                    w: obs.width,
                    h: obs.height
                };
                
                if(playerRect.x < obsRect.x + obsRect.w &&
                   playerRect.x + playerRect.w > obsRect.x &&
                   playerRect.y < obsRect.y + obsRect.h &&
                   playerRect.y + playerRect.h > obsRect.y) {
                    endGame();
                    break;
                }
            }
            
            if(gameRunning) {
                let increment = 0.2 + (currentSpeed - baseSpeed) * 0.25;
                score += increment;
                updateScoreUI();
                updateBestUI();
            }
        }
        
        function changeLane(direction) {
            if(!gameRunning) return;
            if(direction === 'left') {
                playerLane = Math.max(0, playerLane - 1);
            } else if(direction === 'right') {
                playerLane = Math.min(LANE_COUNT-1, playerLane + 1);
            }
        }
        
        // ========== NOVAS FUNÇÕES DE DESENHO COM IMAGENS ==========
        function drawPlayer() {
            const laneY = playerLane * LANE_HEIGHT + (LANE_HEIGHT/2 - CAR_HEIGHT/2);
            
            // Se a imagem do jogador estiver carregada, desenha ela
            if (playerImageLoaded && playerImage.complete && playerImage.naturalWidth > 0) {
                ctx.save();
                ctx.shadowBlur = 8;
                ctx.shadowColor = "#00aaff";
                ctx.drawImage(playerImage, PLAYER_FIXED_X, laneY, CAR_WIDTH, CAR_HEIGHT);
                ctx.restore();
            } else {
                // Fallback: desenha um carro estilizado enquanto a imagem não carrega
                ctx.save();
                ctx.shadowBlur = 8;
                ctx.shadowColor = "#00aaff";
                ctx.fillStyle = "#2cc9ff";
                ctx.beginPath();
                ctx.roundRect(PLAYER_FIXED_X, laneY, CAR_WIDTH, CAR_HEIGHT, 10);
                ctx.fill();
                ctx.fillStyle = "#0a6a9a";
                ctx.beginPath();
                ctx.roundRect(PLAYER_FIXED_X + CAR_WIDTH*0.2, laneY - 2, CAR_WIDTH*0.6, CAR_HEIGHT*0.45, 8);
                ctx.fill();
                ctx.fillStyle = "#ffffff";
                ctx.font = `${Math.floor(CAR_HEIGHT * 0.5)}px "Segoe UI Emoji"`;
                ctx.fillText("🚗", PLAYER_FIXED_X + CAR_WIDTH/2 - 12, laneY + CAR_HEIGHT/2 + 8);
                ctx.restore();
                
                // Texto de aviso (sutil)
                ctx.fillStyle = "#ffffaa";
                ctx.font = "10px monospace";
                ctx.fillText("carregando...", PLAYER_FIXED_X + 5, laneY + CAR_HEIGHT - 5);
            }
            
            // Brilho especial (mantido para destaque)
            ctx.save();
            ctx.globalAlpha = 0.25;
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#00ccff";
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.roundRect(PLAYER_FIXED_X - 2, laneY - 2, CAR_WIDTH + 4, CAR_HEIGHT + 4, 12);
            ctx.fill();
            ctx.restore();
        }
        
        function drawObstacles() {
            for(let obs of obstacles) {
                const laneY = obs.lane * LANE_HEIGHT + (LANE_HEIGHT/2 - obs.height/2);
                const carWidth = obs.width;
                const carHeight = obs.height;
                
                // Desenha a mesma imagem para todos os inimigos
                if (enemyImageLoaded && enemyImage.complete && enemyImage.naturalWidth > 0) {
                    ctx.save();
                    ctx.shadowBlur = 4;
                    ctx.shadowColor = "#2a2a2a";
                    ctx.drawImage(enemyImage, obs.x, laneY, carWidth, carHeight);
                    ctx.restore();
                } else {
                    // Fallback: retângulo vermelho com emoji
                    ctx.save();
                    ctx.shadowBlur = 4;
                    ctx.shadowColor = "#5a1a0a";
                    ctx.fillStyle = "#d64531";
                    ctx.beginPath();
                    ctx.roundRect(obs.x, laneY, carWidth, carHeight, 10);
                    ctx.fill();
                    ctx.fillStyle = "#8b2c1a";
                    ctx.beginPath();
                    ctx.roundRect(obs.x + carWidth*0.2, laneY - 2, carWidth*0.6, carHeight*0.45, 8);
                    ctx.fill();
                    ctx.fillStyle = "#ffffff";
                    ctx.font = `${Math.floor(carHeight * 0.5)}px "Segoe UI Emoji"`;
                    ctx.fillText("👿", obs.x + carWidth/2 - 12, laneY + carHeight/2 + 8);
                    ctx.restore();
                }
            }
        }
        
        function drawRoad() {
            // Asfalto com gradiente
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, "#2a3b36");
            gradient.addColorStop(1, "#1a2b26");
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Linhas pontilhadas das pistas
            for(let i = 1; i < LANE_COUNT; i++) {
                const y = i * LANE_HEIGHT;
                ctx.beginPath();
                ctx.setLineDash([25, 30]);
                ctx.lineWidth = 3;
                ctx.strokeStyle = '#FFD966';
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
            
            // Bordas
            ctx.setLineDash([]);
            ctx.lineWidth = 4;
            ctx.strokeStyle = '#CDA86B';
            ctx.strokeRect(8, 8, canvas.width-16, canvas.height-16);
            
            // Faixas de aceleração laterais
            for(let i=0; i<LANE_COUNT; i++) {
                let laneCenterY = i * LANE_HEIGHT + LANE_HEIGHT/2;
                ctx.font = "bold 22px monospace";
                ctx.fillStyle = '#a8e6cf';
                ctx.fillText("⚡", 18, laneCenterY+10);
                ctx.fillStyle = '#ffcc88';
                ctx.fillText("", canvas.width-40, laneCenterY+10);
            }
            
            // Efeito de movimento nas laterais
            ctx.fillStyle = '#ffffff30';
            for(let i=0; i<15; i++) {
                let x = (Date.now() * 0.008 + i * 55) % canvas.width;
                ctx.fillRect(x, 0, 3, canvas.height);
            }
        }
        
        function drawGameOverlay() {
            if(!gameRunning) {
                ctx.globalAlpha = 0.75;
                ctx.fillStyle = '#050a08';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.globalAlpha = 1;
                ctx.font = 'bold 40px "Segoe UI"';
                ctx.fillStyle = '#ffaa55';
                ctx.shadowBlur = 0;
                ctx.fillText('💥 GAME OVER 💥', canvas.width/2-165, canvas.height/2-30);
                ctx.font = '22px monospace';
                ctx.fillStyle = '#dddd88';
                ctx.fillText('Clique em REINICIAR', canvas.width/2-130, canvas.height/2+40);
            }
            
            // HUD
            ctx.font = "bold 18px 'Segoe UI'";
            ctx.fillStyle = "#ffffffdd";
            ctx.shadowBlur = 0;
            ctx.fillText(`VELOCIDADE: ${currentSpeed.toFixed(1)} | PISTA: ${playerLane+1}/5`, 18, 38);
            ctx.fillStyle = "#ffdd88";
            ctx.fillText(`🚗 CARROS NA PISTA: ${obstacles.length}`, canvas.width-220, 38);
        }
        
        function gameLoop() {
            updateMovement();
            if(gameRunning) {
                trySpawnObstacle();
            }
            drawRoad();
            drawObstacles();
            drawPlayer();
            drawGameOverlay();
            
            animationId = requestAnimationFrame(gameLoop);
        }
        
        // Eventos
        function handleKeyDown(e) {
            const key = e.key;
            if(key === 'ArrowLeft') {
                e.preventDefault();
                changeLane('left');
            } else if(key === 'ArrowRight') {
                e.preventDefault();
                changeLane('right');
            } else if(key === ' ' || key === 'Space') {
                e.preventDefault();
                if(!gameRunning) resetGame();
            }
        }
        
        window.addEventListener('keydown', handleKeyDown);
        
        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');
        const resetBtn = document.getElementById('resetBtn');
        
        leftBtn.addEventListener('click', () => changeLane('left'));
        rightBtn.addEventListener('click', () => changeLane('right'));
        resetBtn.addEventListener('click', () => {
            resetGame();
            obstacles = [];
            gameRunning = true;
            score = 0;
            currentSpeed = baseSpeed;
            playerLane = 2;
            spawnCounter = 0;
            updateScoreUI();
            gameStatusSpan.innerText = '🏁 CORRENDO';
            gameStatusSpan.style.color = "#bcf5e3";
            updateBestUI();
        });
        
        function handleResizeScale() {
            const maxWidth = window.innerWidth - 60;
            if(maxWidth < 1000) {
                canvas.style.width = `${maxWidth}px`;
                canvas.style.height = 'auto';
            } else {
                canvas.style.width = '1000px';
                canvas.style.height = '500px';
            }
        }
        window.addEventListener('resize', handleResizeScale);
        handleResizeScale();
        
        // roundRect suporte
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x+r, y);
                this.lineTo(x+w-r, y);
                this.quadraticCurveTo(x+w, y, x+w, y+r);
                this.lineTo(x+w, y+h-r);
                this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
                this.lineTo(x+r, y+h);
                this.quadraticCurveTo(x, y+h, x, y+h-r);
                this.lineTo(x, y+r);
                this.quadraticCurveTo(x, y, x+r, y);
                return this;
            };
        }
        
        animationId = requestAnimationFrame(gameLoop);
    })();
</script>
</body>
</html>
