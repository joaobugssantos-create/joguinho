<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Corrida Horizontal - 5 Pistas</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #0a2f2a 0%, #071e1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Courier New', monospace;
            margin: 0;
            padding: 20px;
        }

        /* Container principal do jogo */
        .game-container {
            background: #1e3b32;
            border-radius: 56px;
            padding: 20px 25px 25px 25px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,255,255,0.1);
        }

        /* Canvas + overlay de info */
        .race-area {
            position: relative;
            display: inline-block;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 28px;
            box-shadow: 0 12px 28px black;
            cursor: pointer;
            background-color: #2c4b3e;
        }

        /* Painel de status */
        .dashboard {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-top: 18px;
            gap: 20px;
            flex-wrap: wrap;
            background: #0f2922c9;
            backdrop-filter: blur(4px);
            border-radius: 60px;
            padding: 12px 24px;
            border: 1px solid #6bb59a;
        }

        .score-box, .best-box {
            background: #03100e;
            padding: 6px 18px;
            border-radius: 40px;
            color: #c6ffd9;
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 0 0 3px #00cc88;
        }

        .score-box span, .best-box span {
            font-size: 1.5rem;
            font-weight: 800;
            color: #f2ff80;
            margin-left: 12px;
        }

        .controls {
            display: flex;
            gap: 20px;
            background: #00000066;
            padding: 6px 20px;
            border-radius: 50px;
        }

        .controls button {
            background: #2b6e5c;
            border: none;
            font-size: 1.8rem;
            font-weight: bold;
            color: white;
            width: 56px;
            height: 56px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 4px 0 #0a352b;
            font-family: monospace;
        }

        .controls button:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #0a352b;
        }

        .reset-btn {
            background: #d9452e;
            box-shadow: 0 4px 0 #752818;
            width: auto;
            padding: 0 28px;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .status {
            background: #010f0cba;
            padding: 6px 18px;
            border-radius: 32px;
            font-weight: bold;
            color: #bcf5e3;
            font-size: 0.9rem;
        }

        .instrucao {
            font-size: 0.75rem;
            margin-top: 12px;
            text-align: center;
            color: #bae5d4;
            background: #0c2c2470;
            border-radius: 50px;
            padding: 8px;
        }

        @media (max-width: 780px) {
            .dashboard { gap: 8px; padding: 10px 15px; }
            .controls button { width: 48px; height: 48px; font-size: 1.5rem; }
            .reset-btn { padding: 0 18px; }
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <div class="race-area">
            <canvas id="gameCanvas" width="1000" height="500"></canvas>
        </div>
        <div class="dashboard">
            <div class="score-box">🏆 SCORE <span id="scoreValue">0</span></div>
            <div class="best-box">⭐ BEST <span id="bestValue">0</span></div>
            <div class="controls">
                <button id="leftBtn">◀</button>
                <button id="rightBtn">▶</button>
                <button id="resetBtn" class="reset-btn">REINICIAR</button>
            </div>
            <div class="status" id="gameStatusText">🏁 CORRENDO</div>
        </div>
        <div class="instrucao">
            🚗 SETAS ESQUERDA / DIREITA ou clique nos botões | Desvie dos carros vermelhos! 5 pistas horizontais.
            Quanto mais você avança, mais rápido!
        </div>
    </div>
</div>

<script>
    (function(){
        // ----- CONFIGURAÇÕES DO JOGO - HORIZONTAL, 5 PISTAS -----
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Dimensões lógicas
        const LANE_COUNT = 5;
        // Definir alturas dinâmicas (canvas 500px, dividir em 5 faixas)
        const LANE_HEIGHT = canvas.height / LANE_COUNT; // 100px cada pista
        // Largura do carro do jogador e dos obstáculos
        const CAR_WIDTH = 70;
        const CAR_HEIGHT = 64;
        
        // Posicionamento horizontal do jogador é fixo no eixo X (lado esquerdo ~ 15% da pista)
        // Mas o movimento será entre as 5 pistas (verticalmente por lane)
        // O jogo é de corrida horizontal: os obstáculos vêm da direita para a esquerda.
        // O jogador controla a LANE (posição Y) e não se move no X, o cenário simula deslocamento.
        
        // Coordenada fixa X do jogador (começa na esquerda)
        const PLAYER_FIXED_X = 90;
        
        // Dados do jogador
        let playerLane = 2;        // índices 0..4 (0 = pista superior, 4 = inferior)
        let score = 0;
        let bestScore = localStorage.getItem('racingBest5') ? parseInt(localStorage.getItem('racingBest5')) : 0;
        let gameRunning = true;
        let animationId = null;
        
        // configurações de movimento dos obstáculos
        let baseSpeed = 3.2;        // velocidade inicial (px por frame)
        let currentSpeed = baseSpeed;
        let speedIncreaseRate = 0.025; // aumenta a cada frame ou com score? usaremos aumento gradual com score
        
        // Array de obstáculos (carros inimigos)
        let obstacles = [];
        
        // Frames para spawnar novos inimigos
        let spawnCounter = 0;
        let spawnDelayFrames = 40;   // intervalo entre spawns (diminui com a velocidade?)
        let baseSpawnDelay = 45;
        
        // Flag para controle de invencibilidade pós-colisão / respawn (neste jogo: ao colidir, game over e reseta)
        // Mas faremos estilo "colidiu -> game over e para o movimento". Mas com botão reset.
        // Vamos implementar colisão precisa e ao colidir, gameRunning = false e para spawns.
        
        // Exibir melhor pontuação
        const bestSpan = document.getElementById('bestValue');
        const scoreSpan = document.getElementById('scoreValue');
        const gameStatusSpan = document.getElementById('gameStatusText');
        
        bestSpan.innerText = bestScore;
        
        // Atualizar UI da pontuação
        function updateScoreUI() {
            scoreSpan.innerText = Math.floor(score);
        }
        
        // Salvar best
        function updateBestUI() {
            if(score > bestScore) {
                bestScore = Math.floor(score);
                bestSpan.innerText = bestScore;
                localStorage.setItem('racingBest5', bestScore);
            }
        }
        
        // Fim de jogo
        function endGame() {
            if(!gameRunning) return;
            gameRunning = false;
            gameStatusSpan.innerText = '💥 GAME OVER 💥';
            gameStatusSpan.style.color = "#ffaa99";
            // não remove animação, mas interrompe movimento? A animação ainda desenha estado parado
            // Vamos cancelar movimentos futuros? manter desenho estático, cancelar o loop de atualizações? 
            // Mas podemos simplesmente parar de chamar updateGame. Mas a animação continua mostrando tela com mensagem.
            // O ideal: manter desenho, mas não atualizar lógica de movimento.
        }
        
        // Reiniciar totalmente o jogo
        function resetGame() {
            // resetar variáveis
            gameRunning = true;
            score = 0;
            currentSpeed = baseSpeed;
            playerLane = 2;
            obstacles = [];
            spawnCounter = 0;
            spawnDelayFrames = baseSpawnDelay;
            updateScoreUI();
            gameStatusSpan.innerText = '🏁 CORRENDO';
            gameStatusSpan.style.color = "#bcf5e3";
            // se houver alguma colisão pendente, limpa tudo
            // manter animação rodando (já está rodando)
        }
        
        // Lógica de spawn de inimigos
        function trySpawnObstacle() {
            if(!gameRunning) return;
            // Diminuir spawnDelay conforme a velocidade (mais rápido = mais frequente) 
            let dynamicDelay = Math.max(22, baseSpawnDelay - Math.floor(currentSpeed - baseSpeed) * 1.2);
            if(spawnCounter >= dynamicDelay) {
                spawnCounter = 0;
                // escolher uma pista aleatória (0..4)
                const lane = Math.floor(Math.random() * LANE_COUNT);
                // O obstáculo aparece na extrema direita do canvas
                const startX = canvas.width;
                obstacles.push({
                    x: startX,
                    lane: lane,
                    width: CAR_WIDTH,
                    height: CAR_HEIGHT,
                    color: '#d64531'   // carro inimigo vermelho
                });
            } else {
                spawnCounter++;
            }
        }
        
        // Atualizar posições dos obstáculos e colisões
        function updateMovement() {
            if(!gameRunning) return;
            
            // Aumento de velocidade gradual com base na pontuação (dificuldade)
            // Cada 100 pontos aumenta velocidade e reduz spawn
            let newSpeed = baseSpeed + Math.floor(score / 180) * 0.55;
            newSpeed = Math.min(newSpeed, 9.5);
            currentSpeed = newSpeed;
            
            // Atualizar posições (mover da direita pra esquerda)
            for(let i=0; i<obstacles.length; i++) {
                obstacles[i].x -= currentSpeed;
            }
            // remover obstáculos que passaram do limite esquerdo (x + largura < 0)
            obstacles = obstacles.filter(obs => obs.x + CAR_WIDTH > 0);
            
            // COLISÃO: verificar se o jogador (caixa retangular) colide com qualquer obstáculo na mesma pista
            const playerRect = {
                x: PLAYER_FIXED_X,
                y: playerLane * LANE_HEIGHT + (LANE_HEIGHT/2 - CAR_HEIGHT/2),
                w: CAR_WIDTH,
                h: CAR_HEIGHT
            };
            
            for(let i=0; i<obstacles.length; i++) {
                const obs = obstacles[i];
                const obsRect = {
                    x: obs.x,
                    y: obs.lane * LANE_HEIGHT + (LANE_HEIGHT/2 - CAR_HEIGHT/2),
                    w: CAR_WIDTH,
                    h: CAR_HEIGHT
                };
                // colisão simples AABB
                if(playerRect.x < obsRect.x + obsRect.w &&
                   playerRect.x + playerRect.w > obsRect.x &&
                   playerRect.y < obsRect.y + obsRect.h &&
                   playerRect.y + playerRect.h > obsRect.y) {
                    // Colidiu!
                    endGame();
                    break; // só uma colisão por frame
                }
            }
            
            // Pontuação: Cada frame em que o jogo está rodando acumula pontos com base na velocidade
            // + evitar que após gameover pontue
            if(gameRunning) {
                // incremento baseado na velocidade e dificuldade para dar dinamismo
                let increment = 0.18 + (currentSpeed - baseSpeed) * 0.2;
                score += increment;
                updateScoreUI();
                updateBestUI();
            }
        }
        
        // controlar troca de pista (esquerda/direita no eixo Y)
        function changeLane(direction) {
            if(!gameRunning) return;  // jogo finalizado não troca pista
            if(direction === 'left') {
                playerLane = Math.max(0, playerLane - 1);
            } else if(direction === 'right') {
                playerLane = Math.min(LANE_COUNT-1, playerLane + 1);
            }
        }
        
        // ----- DESENHO COMPLETO (estilo arcade horizontal) -----
        function drawRoad() {
            // fundo asfalto com faixas laterais
            ctx.fillStyle = '#1e2f2a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // desenhar divisórias das pistas (linhas pontilhadas horizontais)
            for(let i = 1; i < LANE_COUNT; i++) {
                const y = i * LANE_HEIGHT;
                ctx.beginPath();
                ctx.setLineDash([20, 25]);
                ctx.lineWidth = 3;
                ctx.strokeStyle = '#ffdf8c';
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
            // linha de contorno superior e inferior
            ctx.setLineDash([]);
            ctx.lineWidth = 5;
            ctx.strokeStyle = '#f5bc70';
            ctx.strokeRect(5, 5, canvas.width-10, canvas.height-10);
            
            // marcações de aceleração nas laterais
            for(let i=0; i<LANE_COUNT; i++) {
                let laneCenterY = i * LANE_HEIGHT + LANE_HEIGHT/2;
                ctx.beginPath();
                ctx.fillStyle = '#9ed9c4';
                ctx.font = "bold 18monospace";
                ctx.shadowBlur = 0;
                ctx.fillText("⚡", 25, laneCenterY+8);
                ctx.fillText("🏁", canvas.width-45, laneCenterY+8);
            }
            
            // efeito de movimento (zonas de velocidade)
            ctx.fillStyle = '#ffffff30';
            for(let i=0; i<12; i++) {
                let x = (Date.now() * 0.005 + i * 70) % canvas.width;
                ctx.fillRect(x, 0, 3, canvas.height);
            }
        }
        
        function drawPlayer() {
            const laneY = playerLane * LANE_HEIGHT + (LANE_HEIGHT/2 - CAR_HEIGHT/2);
            // carro do jogador (esportivo azul)
            ctx.shadowBlur = 6;
            ctx.shadowColor = "#00ffff";
            // corpo
            ctx.fillStyle = '#2cc9ff';
            ctx.beginPath();
            ctx.roundRect(PLAYER_FIXED_X, laneY, CAR_WIDTH, CAR_HEIGHT, 12);
            ctx.fill();
            // detalhes
            ctx.fillStyle = '#0a2a3f';
            ctx.beginPath();
            ctx.roundRect(PLAYER_FIXED_X+8, laneY+12, 12, 18, 5);
            ctx.roundRect(PLAYER_FIXED_X+CAR_WIDTH-20, laneY+12, 12, 18, 5);
            ctx.fill();
            ctx.fillStyle = '#FFD966';
            ctx.beginPath();
            ctx.rect(PLAYER_FIXED_X+25, laneY+25, 20, 15);
            ctx.fill();
            // faróis
            ctx.fillStyle = '#f9f3c7';
            ctx.fillRect(PLAYER_FIXED_X+CAR_WIDTH-12, laneY+12, 8, 12);
            ctx.fillRect(PLAYER_FIXED_X+4, laneY+12, 8, 12);
            ctx.fillStyle = "white";
            ctx.font = "bold 28px monospace";
            ctx.fillText("https://www.reddit.com/r/AndroidGaming/comments/13tut7k/finding_a_2d_car_game_ive_played_around_201516/?tl=pt-br", PLAYER_FIXED_X+22, laneY+48);
            ctx.shadowBlur = 0;
        }
        
        function drawObstacles() {
            for(let obs of obstacles) {
                const laneY = obs.lane * LANE_HEIGHT + (LANE_HEIGHT/2 - CAR_HEIGHT/2);
                // carro inimigo vermelho agressivo
                ctx.fillStyle = '#e34d2e';
                ctx.shadowBlur = 4;
                ctx.shadowColor = "#9a2a0e";
                ctx.beginPath();
                ctx.roundRect(obs.x, laneY, CAR_WIDTH, CAR_HEIGHT, 10);
                ctx.fill();
                ctx.fillStyle = '#7a2a14';
                ctx.beginPath();
                ctx.roundRect(obs.x+12, laneY+10, 12, 18, 4);
                ctx.roundRect(obs.x+CAR_WIDTH-24, laneY+10, 12, 18, 4);
                ctx.fill();
                ctx.fillStyle = "#2c1e1a";
                ctx.fillRect(obs.x+28, laneY+35, 14, 12);
                ctx.fillStyle = "#ff7b47";
                ctx.font = "26px monospace";
                ctx.fillText("👿", obs.x+24, laneY+50);
                ctx.shadowBlur = 0;
            }
        }
        
        function drawGameOverlay() {
            if(!gameRunning) {
                ctx.globalAlpha = 0.7;
                ctx.fillStyle = '#0a0f0e';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.globalAlpha = 1;
                ctx.font = 'bold 34monospace';
                ctx.fillStyle = '#ffb347';
                ctx.shadowBlur = 0;
                ctx.fillText('💥 GAME OVER 💥', canvas.width/2-150, canvas.height/2-40);
                ctx.font = '20monospace';
                ctx.fillStyle = '#dae6dd';
                ctx.fillText('Clique em REINICIAR', canvas.width/2-120, canvas.height/2+40);
            }
            
            // Mostrar velocidade e pista atual (HUD)
            ctx.font = "bold 16px 'Segoe UI'";
            ctx.fillStyle = "#ffffffcc";
            ctx.shadowBlur = 0;
            ctx.fillText(`SPEED: ${currentSpeed.toFixed(1)} | PISTA: ${playerLane+1}`, 20, 35);
            ctx.fillStyle = "#fad974";
            ctx.fillText(`🏎️ SCORE: ${Math.floor(score)}`, canvas.width-160, 40);
        }
        
        // Função principal de animação
        function gameLoop() {
            // atualiza movimento e colisões (se gameRunning atualiza obstáculos e pontua)
            updateMovement();
            // spawn de novos inimigos (baseado na dificuldade)
            if(gameRunning) {
                trySpawnObstacle();
            }
            // desenhar tudo
            drawRoad();
            drawObstacles();
            drawPlayer();
            drawGameOverlay();
            
            // continua o loop
            animationId = requestAnimationFrame(gameLoop);
        }
        
        // ---- EVENTOS: teclado e botoes touch ----
        function handleKeyDown(e) {
            const key = e.key;
            if(key === 'ArrowLeft') {
                e.preventDefault();
                changeLane('left');
            } else if(key === 'ArrowRight') {
                e.preventDefault();
                changeLane('right');
            } else if(key === ' ' || key === 'Space') {
                e.preventDefault();
                if(!gameRunning) resetGame();
            }
        }
        
        // para evitar scroll com setas
        window.addEventListener('keydown', handleKeyDown);
        
        // Botões da interface
        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');
        const resetBtn = document.getElementById('resetBtn');
        
        leftBtn.addEventListener('click', () => changeLane('left'));
        rightBtn.addEventListener('click', () => changeLane('right'));
        resetBtn.addEventListener('click', () => {
            resetGame();
            // força visual rápida: se game over, limpa obstáculos e reinicia estado
            // Reset extra: garantir que não fique lixo
            obstacles = [];
            gameRunning = true;
            score = 0;
            currentSpeed = baseSpeed;
            playerLane = 2;
            spawnCounter = 0;
            updateScoreUI();
            gameStatusSpan.innerText = '🏁 CORRENDO';
            gameStatusSpan.style.color = "#bcf5e3";
            updateBestUI(); // atualiza melhor exibição
        });
        
        // também dar suporte a clique no canvas se quiser, mas mantemos botões e teclado
        
        // Inicializar melhor score
        if(bestScore > 0) bestSpan.innerText = bestScore;
        else bestSpan.innerText = "0";
        
        // Ajustar responsividade? O canvas é fixo 1000x500, mas para telas pequenas vamos adicionar CSS scale?
        // boa prática: permitir zoom se necessário, mas mantemos proporção.
        function handleResizeScale() {
            const container = document.querySelector('.race-area');
            const maxWidth = window.innerWidth - 60;
            if(maxWidth < 1000) {
                canvas.style.width = `${maxWidth}px`;
                canvas.style.height = 'auto';
            } else {
                canvas.style.width = '1000px';
                canvas.style.height = '500px';
            }
        }
        window.addEventListener('resize', handleResizeScale);
        handleResizeScale();
        
        // Iniciar jogo com alguns obstáculos de exemplo? não é necessário, vazio.
        // Para gerar sensação inicial mais rápida, spawnaremos rápido
        setTimeout(() => {
            if(obstacles.length === 0 && gameRunning) {
                for(let i=0;i<1;i++) trySpawnObstacle();
            }
        }, 200);
        
        // Robusto método roundRect
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x+r, y);
                this.lineTo(x+w-r, y);
                this.quadraticCurveTo(x+w, y, x+w, y+r);
                this.lineTo(x+w, y+h-r);
                this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
                this.lineTo(x+r, y+h);
                this.quadraticCurveTo(x, y+h, x, y+h-r);
                this.lineTo(x, y+r);
                this.quadraticCurveTo(x, y, x+r, y);
                return this;
            };
        }
        
        // Inicializar loop
        animationId = requestAnimationFrame(gameLoop);
    })();
</script>
</body>
</html>
