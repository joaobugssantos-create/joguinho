<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🏁 Corrida Emoticon - Desvie dos obstáculos! 🚗💨</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #0a2f2c 0%, #031010 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', 'Monaco', monospace;
            margin: 0;
            padding: 20px;
        }

        /* Container principal do jogo */
        .game-container {
            background: #1e2a2a;
            border-radius: 48px;
            padding: 20px 25px 25px 25px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255, 255, 255, 0.1);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 12px 28px black;
            cursor: pointer;
            background-color: #2b2b2b;
        }

        /* Painel de informações com emoticons */
        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #000000aa;
            backdrop-filter: blur(8px);
            margin-top: 18px;
            padding: 12px 24px;
            border-radius: 60px;
            color: #f5f9ff;
            text-shadow: 0 2px 3px black;
            font-weight: bold;
            font-size: 1.5rem;
            gap: 15px;
            flex-wrap: wrap;
            border: 1px solid #ffd966aa;
        }

        .score-box, .best-box {
            background: #0f2120;
            padding: 6px 20px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.8rem;
            letter-spacing: 1px;
            box-shadow: inset 0 1px 3px #00000055, 0 5px 8px #00000033;
        }

        .score-box span:first-child, .best-box span:first-child {
            font-size: 1.3rem;
            background: #ffb347;
            padding: 5px 12px;
            border-radius: 30px;
            color: #1f2a1b;
        }

        .restart-btn {
            background: #ff9800;
            border: none;
            font-size: 1.7rem;
            font-family: monospace;
            font-weight: bold;
            padding: 6px 22px;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 0 #b45f06;
            color: #2c1e0f;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .restart-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #b45f06;
        }

        .instruction {
            background: #0b1919cc;
            border-radius: 32px;
            padding: 5px 16px;
            font-size: 1rem;
            font-weight: 500;
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .instruction span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #00000066;
            padding: 4px 12px;
            border-radius: 40px;
        }

        @media (max-width: 550px) {
            .info-panel { font-size: 1rem; }
            .score-box, .best-box { font-size: 1.3rem; padding: 4px 12px; }
            .score-box span:first-child { font-size: 1rem; }
            .restart-btn { font-size: 1.2rem; padding: 4px 16px; }
            .instruction span { font-size: 0.7rem; }
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="500" height="550"></canvas>
        
        <div class="info-panel">
            <div class="score-box">
                <span>🏆 SCORE</span>
                <span id="scoreValue">0</span>
            </div>
            <div class="best-box">
                <span>⭐ BEST</span>
                <span id="bestValue">0</span>
            </div>
            <button class="restart-btn" id="restartButton">🔄 REINICIAR 🏁</button>
        </div>
        <div class="instruction">
            <span>⬅️  ➡️  SETAS</span>
            <span>🚗 DESVIE DOS 🚧 💥</span>
            <span>🏎️ QUANTO MAIS LONGE, MAIS PONTOS!</span>
        </div>
    </div>
</div>

<script>
    (function(){
        // -------- CONFIGURAÇÕES DO JOGO --------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Dimensões
        const LANE_COUNT = 5;
        const LANE_WIDTH = canvas.width / LANE_COUNT;  // 100px cada pista
        const CAR_WIDTH = LANE_WIDTH * 0.65;
        const CAR_HEIGHT = CAR_WIDTH * 1.1;
        
        // Posição inicial do carro (pista do meio índice 2)
        let carLane = 2;          // 0 a 4
        let score = 0;
        let bestScore = localStorage.getItem('racingBestScore') ? parseInt(localStorage.getItem('racingBestScore')) : 0;
        let gameRunning = true;
        let animationId = null;
        
        // Vetor de obstáculos (emoticons surpresa)
        let obstacles = [];
        
        // Controle de geração de obstáculos (frames)
        let frameCounter = 0;
        let baseSpawnDelay = 45;    // aumenta dificuldade com score
        let currentSpawnDelay = 45;
        
        // Velocidade base dos obstáculos (aumenta com pontuação)
        let baseObstacleSpeed = 3.2;
        let currentSpeed = 3.2;
        
        // efeitos visuais (pisca colisão)
        let collisionFlash = 0;
        
        // emoticons do carro principal e obstáculos variados
        const CAR_EMOJI = "🚗💨";     // carro esportivo
        // Lista de emoticons de obstáculo (coisas perigosas / engraçadas)
        const OBSTACLE_EMOJIS = ["🚧", "🪨", "🧱", "🐢", "🌵", "💥", "⛔", "🚓", "🧨", "🍩"];
        
        // Controle de teclado
        let leftPressed = false;
        let rightPressed = false;
        
        // ---- Carrega melhor pontuação no display ----
        function updateBestUI() {
            document.getElementById('bestValue').innerText = bestScore;
        }
        updateBestUI();
        
        // -------- CLASSE OBSTÁCULO (Emoticon) --------
        class Obstacle {
            constructor(lane, y, emoji) {
                this.lane = lane;          // 0..4
                this.y = y;
                this.width = CAR_WIDTH;
                this.height = CAR_HEIGHT;
                this.emoji = emoji;
            }
            
            draw() {
                const x = this.lane * LANE_WIDTH + (LANE_WIDTH/2) - this.width/2;
                // sombra suave
                ctx.shadowBlur = 8;
                ctx.shadowColor = "rgba(0,0,0,0.5)";
                ctx.font = `${Math.floor(this.height * 0.85)}px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", monospace`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                // efeito brilho dependendo do emoji
                if(this.emoji === "💥" || this.emoji === "🚓") {
                    ctx.shadowColor = "#ff6600";
                }
                ctx.fillText(this.emoji, x + this.width/2, this.y + this.height/2);
                ctx.shadowBlur = 0;
                // pequeno contorno para destacar
                ctx.font = `${Math.floor(this.height * 0.85)}px "Segoe UI Emoji", "Apple Color Emoji"`;
            }
            
            update() {
                this.y += currentSpeed;
            }
            
            getBounds() {
                const x = this.lane * LANE_WIDTH + (LANE_WIDTH/2) - this.width/2;
                return {
                    x: x,
                    y: this.y,
                    w: this.width,
                    h: this.height
                };
            }
        }
        
        // -------- FUNÇÕES PRINCIPAIS --------
        function resetGame() {
            gameRunning = true;
            score = 0;
            document.getElementById('scoreValue').innerText = "0";
            obstacles = [];
            carLane = 2;
            frameCounter = 0;
            collisionFlash = 0;
            currentSpeed = baseObstacleSpeed;
            currentSpawnDelay = baseSpawnDelay;
            leftPressed = false;
            rightPressed = false;
            // atualiza melhor pontuação mostrada (não reseta o best)
            updateBestUI();
        }
        
        // gera obstáculo aleatório em pista que não esteja muito cheia (evita empilhamento excessivo)
        function spawnObstacle() {
            if(!gameRunning) return;
            // escolhe pista livre? vamos evitar spawn na mesma pista do carro? Não, porque o desafio é desviar, mas evitar spawn duplicado muito próximo
            // Porém para o jogo ser justo, pode spawnar na pista do carro, isso obriga reação rápida. legal!
            let lane = Math.floor(Math.random() * LANE_COUNT);
            // pequena segurança: se tiver obstaculo muito proximo no topo na mesma pista (y < 70), atrasa um pouco? melhor não travar
            let tooClose = obstacles.some(obs => obs.lane === lane && obs.y < 90);
            if (tooClose && obstacles.length < 8) {
                // tenta outra pista uma vez
                for(let i=0; i<3; i++) {
                    let newLane = Math.floor(Math.random() * LANE_COUNT);
                    if(!obstacles.some(obs => obs.lane === newLane && obs.y < 80)) {
                        lane = newLane;
                        break;
                    }
                }
            }
            const randomEmoji = OBSTACLE_EMOJIS[ Math.floor(Math.random() * OBSTACLE_EMOJIS.length) ];
            const newObs = new Obstacle(lane, -CAR_HEIGHT - 2, randomEmoji);
            obstacles.push(newObs);
        }
        
        // Atualiza dificuldade com base na pontuação
        function updateDifficulty() {
            if(!gameRunning) return;
            // velocidade máxima 8.5
            let newSpeed = baseObstacleSpeed + Math.floor(score / 380);
            currentSpeed = Math.min(8.8, newSpeed);
            // spawn delay: quanto maior score, menor delay (mais obstaculos)
            let newDelay = Math.max(20, baseSpawnDelay - Math.floor(score / 220));
            currentSpawnDelay = newDelay;
        }
        
        // Lógica de colisão e movimento
        function updateGame() {
            if(!gameRunning) return;
            
            // Movimento do carro por teclas
            if(leftPressed && carLane > 0) {
                carLane--;
                leftPressed = false; // sensibilidade ao toque/tecla - move uma vez por quadro mas para evitar ultra rápido, usamos flag de cooldown pequeno
                // na verdade com keydown repetindo, fica suave, sem problemas. Mas só movemos uma vez por frame.
            }
            if(rightPressed && carLane < LANE_COUNT-1) {
                carLane++;
                rightPressed = false;
            }
            
            // Atualizar obstáculos e remover os que passaram da tela (e contabilizar pontos)
            const beforeCount = obstacles.length;
            for(let i=0; i<obstacles.length; i++) {
                const obs = obstacles[i];
                obs.update();
            }
            // filtra obstáculos que saíram da tela (y > canvas.height)
            let newObstacles = [];
            for(let obs of obstacles) {
                if(obs.y < canvas.height + 50) {
                    newObstacles.push(obs);
                } else {
                    // o obstáculo passou sem colidir: ganha pontos!
                    if(gameRunning) {
                        score += 5;
                        document.getElementById('scoreValue').innerText = Math.floor(score);
                        updateDifficulty();
                    }
                }
            }
            obstacles = newObstacles;
            
            // Verificar colisão (retangular entre carro e obstáculos)
            const carX = carLane * LANE_WIDTH + (LANE_WIDTH/2) - CAR_WIDTH/2;
            const carY = canvas.height - CAR_HEIGHT - 8;
            const carBounds = {
                x: carX,
                y: carY,
                w: CAR_WIDTH,
                h: CAR_HEIGHT
            };
            
            for(let i=0; i<obstacles.length; i++) {
                const obsBounds = obstacles[i].getBounds();
                if(carBounds.x < obsBounds.x + obsBounds.w &&
                    carBounds.x + carBounds.w > obsBounds.x &&
                    carBounds.y < obsBounds.y + obsBounds.h &&
                    carBounds.y + carBounds.h > obsBounds.y) {
                    // COLISÃO! Fim de jogo
                    gameRunning = false;
                    collisionFlash = 12; // efeito visual piscante
                    
                    // Atualizar melhor pontuação
                    const currentTotalScore = Math.floor(score);
                    if(currentTotalScore > bestScore) {
                        bestScore = currentTotalScore;
                        localStorage.setItem('racingBestScore', bestScore);
                        updateBestUI();
                    }
                    break;
                }
            }
            
            // Geração de novos obstáculos (se jogo ainda rodando)
            if(gameRunning) {
                frameCounter++;
                if(frameCounter >= currentSpawnDelay) {
                    frameCounter = 0;
                    spawnObstacle();
                    // pequeno ajuste: se dificuldade aumentar, as vezes spawn duplo emocionante
                    if(currentSpawnDelay < 28 && Math.random() < 0.25 && obstacles.length < 10){
                        spawnObstacle();
                    }
                }
            }
            
            // Atualiza display do score a cada frame (caso tenha sido alterado por passagem)
            document.getElementById('scoreValue').innerText = Math.floor(score);
        }
        
        // -------- DESENHO COMPLETO (estilo neon + emoticons) --------
        function drawRoad() {
            // asfalto escuro com textura
            ctx.fillStyle = "#1c2c2a";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            // faixas laterais
            for(let i=0; i<LANE_COUNT; i++) {
                ctx.beginPath();
                ctx.strokeStyle = "#FFD966";
                ctx.lineWidth = 3;
                ctx.setLineDash([15, 25]);
                ctx.moveTo(i*LANE_WIDTH + LANE_WIDTH/2, 0);
                ctx.lineTo(i*LANE_WIDTH + LANE_WIDTH/2, canvas.height);
                ctx.stroke();
            }
            ctx.setLineDash([]);
            // linhas de borda
            ctx.strokeStyle = "#f5b042";
            ctx.lineWidth = 5;
            ctx.strokeRect(8, 8, canvas.width-16, canvas.height-16);
            // asfalto sujo
            ctx.fillStyle = "#a9b27e30";
            for(let i=0;i<80;i++) {
                ctx.fillRect(20+Math.random()*canvas.width, Math.random()*canvas.height, 2,2);
            }
            // faixa de pedestre vibe
            ctx.fillStyle = "#ffee88";
            for(let i=0;i<12;i++) {
                ctx.fillRect(10, canvas.height-35 - i*5, canvas.width-20, 2);
            }
        }
        
        function drawCar() {
            const carX = carLane * LANE_WIDTH + (LANE_WIDTH/2) - CAR_WIDTH/2;
            const carY = canvas.height - CAR_HEIGHT - 8;
            // sombra lateral
            ctx.shadowBlur = 12;
            ctx.shadowColor = "#00ffff88";
            // brilho se jogo ativo
            if(gameRunning) {
                ctx.shadowColor = "#ffaa33";
            } else {
                ctx.shadowColor = "#ff3333cc";
            }
            ctx.font = `${Math.floor(CAR_HEIGHT * 0.95)}px "Segoe UI Emoji", "Apple Color Emoji"`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(CAR_EMOJI, carX + CAR_WIDTH/2, carY + CAR_HEIGHT/2);
            // adicionar rastro ou farol
            ctx.fillStyle = "#ffbb77aa";
            ctx.beginPath();
            ctx.arc(carX + CAR_WIDTH*0.2, carY+CAR_HEIGHT-5, 5, 0, Math.PI*2);
            ctx.arc(carX + CAR_WIDTH*0.8, carY+CAR_HEIGHT-5, 5, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        function drawObstacles() {
            for(let obs of obstacles) {
                obs.draw();
            }
        }
        
        function drawScoreAndEffects() {
            // Efeito de colisão: piscar tela vermelha
            if(collisionFlash > 0) {
                ctx.fillStyle = `rgba(255, 50, 50, ${Math.min(0.7, collisionFlash/10)})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                collisionFlash--;
            }
            
            // Game over display com emoticon triste
            if(!gameRunning) {
                ctx.font = "bold 42px 'Segoe UI Emoji', monospace";
                ctx.shadowBlur = 0;
                ctx.fillStyle = "#FFE484";
                ctx.shadowColor = "black";
                ctx.fillText("💀 GAME OVER 💀", canvas.width/2, canvas.height/2 - 50);
                ctx.font = "28px monospace";
                ctx.fillStyle = "#fcd757";
                ctx.fillText(" aperte ▶️ REINICIAR", canvas.width/2, canvas.height/2 + 40);
                ctx.font = "26px monospace";
                ctx.fillStyle = "#ccc";
                ctx.fillText(`🏁 Pontuação: ${Math.floor(score)}`, canvas.width/2, canvas.height/2 + 100);
            } else {
                // desenha mini velocidade com emoticon
                ctx.font = "18px monospace";
                ctx.fillStyle = "#D9F0EC";
                ctx.shadowBlur = 0;
                ctx.fillText(`⚡ VEL ${currentSpeed.toFixed(1)} ⚡`, canvas.width-100, 30);
                ctx.fillText(`🚗 Pista ${carLane+1}/${LANE_COUNT}`, 20, 40);
            }
            // informação de melhor recorde dentro do canvas
            ctx.font = "bold 16px monospace";
            ctx.fillStyle = "#f9e0a0";
            ctx.fillText(`⭐ RECORDE: ${bestScore}`, canvas.width-150, 70);
        }
        
        function render() {
            drawRoad();
            drawObstacles();
            drawCar();
            drawScoreAndEffects();
        }
        
        // -------- LOOP PRINCIPAL ANIMATION --------
        function gameLoop() {
            if(gameRunning) {
                updateGame();
            }
            render();
            animationId = requestAnimationFrame(gameLoop);
        }
        
        // -------- EVENTOS DE TECLADO (setas) --------
        function handleKeyDown(e) {
            if(e.key === 'ArrowLeft') {
                e.preventDefault();
                if(gameRunning) {
                    // movimento imediato com limite por frame: mas com esta flag apenas move uma vez por frame para não passar de duas pistas
                    if(carLane > 0) carLane--;
                }
                // mesmo se não estiver rodando, evitamos conflito
            } else if(e.key === 'ArrowRight') {
                e.preventDefault();
                if(gameRunning) {
                    if(carLane < LANE_COUNT-1) carLane++;
                }
            }
            // Atalho R para reiniciar
            if(e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                resetGame();
            }
        }
        
        // prevenção de scroll com setas também no keydown global
        window.addEventListener('keydown', function(e) {
            if(e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                e.preventDefault();
            }
        });
        
        document.addEventListener('keydown', handleKeyDown);
        
        // TOQUE / MOBILE: controles simples por toque na tela nas laterais
        let touchStartX = 0;
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touchX = e.touches[0].clientX - rect.left;
            const canvasW = canvas.width;
            if(touchX < canvasW/2) {
                // esquerda
                if(gameRunning && carLane > 0) carLane--;
            } else {
                if(gameRunning && carLane < LANE_COUNT-1) carLane++;
            }
        });
        
        canvas.addEventListener('mousedown', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const canvasW = canvas.width;
            if(mouseX < canvasW/2) {
                if(gameRunning && carLane > 0) carLane--;
            } else {
                if(gameRunning && carLane < LANE_COUNT-1) carLane++;
            }
        });
        
        // Botão restart
        const restartBtn = document.getElementById('restartButton');
        restartBtn.addEventListener('click', () => {
            resetGame();
            // se o jogo estava parado, limpa e recomeça
            gameRunning = true;
            collisionFlash = 0;
            // garantia que não haja lixo
            obstacles = [];
            score = 0;
            document.getElementById('scoreValue').innerText = "0";
            carLane = 2;
            frameCounter = 0;
            currentSpeed = baseObstacleSpeed;
            currentSpawnDelay = baseSpawnDelay;
            updateDifficulty();
        });
        
        // Inicializa jogo
        resetGame();
        // Adiciona alguns obstáculos iniciais para não ficar vazio? não obrigatório mas legal
        setTimeout(() => {
            if(obstacles.length === 0 && gameRunning){
                for(let i=0;i<1;i++) spawnObstacle();
            }
        }, 200);
        
        // inicia o loop do jogo
        gameLoop();
    })();
</script>
</body>
</html>
